<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Calendar frame -->
  <rect x="2" y="4" width="20" height="17" rx="2" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Mounting pegs -->
  <line x1="8"  y1="2" x2="8"  y2="6" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="2" x2="16" y2="6" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Header divider -->
  <line x1="2" y1="9" x2="22" y2="9" stroke="black" stroke-width="1.5"/>
  <!-- 7-day task bars, bottom-aligned — busy weekdays, light weekend -->
  <rect x="3.5"  y="13" width="1.5" height="7" rx="0.75"/>
  <rect x="6"    y="11" width="1.5" height="9" rx="0.75"/>
  <rect x="8.5"  y="15" width="1.5" height="5" rx="0.75"/>
  <rect x="11"   y="12" width="1.5" height="8" rx="0.75"/>
  <rect x="13.5" y="14" width="1.5" height="6" rx="0.75"/>
  <rect x="16"   y="17" width="1.5" height="3" rx="0.75"/>
  <rect x="18.5" y="18" width="1.5" height="2" rx="0.75"/>
</svg>
