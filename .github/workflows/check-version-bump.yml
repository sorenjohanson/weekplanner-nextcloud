name: Check version bump

on:
  pull_request:
    paths:
      - package.json
      - appinfo/info.xml

permissions:
  contents: read

concurrency:
  group: check-version-bump-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: Version bump matches conventional commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run check
        run: python3 tools/ci/check-version-bump.py
