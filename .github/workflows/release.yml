name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── CI checks ─────────────────────────────────────────────────────────
  # All checks must pass before a release is created.

  lint-info-xml:
    uses: ./.github/workflows/lint-info-xml.yml

  lint-eslint:
    uses: ./.github/workflows/lint-eslint.yml

  lint-stylelint:
    uses: ./.github/workflows/lint-stylelint.yml

  lint-php:
    uses: ./.github/workflows/lint-php.yml

  lint-php-cs:
    uses: ./.github/workflows/lint-php-cs.yml

  node-build:
    uses: ./.github/workflows/node.yml

  psalm:
    uses: ./.github/workflows/psalm-matrix.yml

  test-app-signature:
    uses: ./.github/workflows/test-app-signature.yml
    # The validate-keys job declares `environment: Production` and pulls
    # APP_PRIVATE_KEY directly from there, so no explicit secrets pass.

  # ─── Release ──────────────────────────────────────────────────────────
  # Only runs after ALL CI checks pass.

  release:
    needs: [lint-info-xml, lint-eslint, lint-stylelint, lint-php, lint-php-cs, node-build, psalm, test-app-signature]
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    env:
      APP_ID: weekplanner
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches info.xml
        run: |
          XML_VERSION=$(grep -oP '(?<=<version>).*(?=</version>)' appinfo/info.xml)
          if [ "$XML_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match info.xml version ($XML_VERSION)"
            exit 1
          fi

      - name: Read package.json node and npm engines version
        uses: skjnldsv/read-package-engines-version-actions@06d6baf7d8f41934ab630e97d9e6c0bc9c9ac5e4 # v3
        id: versions
        with:
          fallbackNode: '^20'
          fallbackNpm: '^10'

      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Set up node ${{ steps.versions.outputs.nodeVersion }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ steps.versions.outputs.nodeVersion }}
          cache: 'pnpm'

      - name: Get php version
        id: php_versions
        uses: icewind1991/nextcloud-version-matrix@58becf3b4bb6dc6cef677b15e2fd8e7d48c0908f # v1.3.1

      - name: Set up php${{ steps.php_versions.outputs.php-min }}
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a # v2.33.0
        with:
          php-version: ${{ steps.php_versions.outputs.php-min }}
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, sqlite, pdo_sqlite
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: 0
          PUPPETEER_SKIP_DOWNLOAD: true
        run: pnpm install --frozen-lockfile

      - name: Install signing tooling (phpseclib3 in vendor-bin/signing)
        run: |
          # tools/sign-app.php and tools/verify-app-signature.php require
          # phpseclib3 to produce / verify RSA-PSS signatures matching
          # Nextcloud's Checker scheme. Install via composer-bin without
          # pulling in the rest of the dev tooling.
          composer install --no-progress --no-interaction --no-scripts
          composer bin signing install --no-progress --no-interaction

      - name: Build frontend
        run: |
          rm -rf js css
          pnpm run build

      - name: Assemble app directory
        run: |
          mkdir -p /tmp/${{ env.APP_ID }}
          cp -r appinfo /tmp/${{ env.APP_ID }}/
          cp -r lib /tmp/${{ env.APP_ID }}/
          cp -r js /tmp/${{ env.APP_ID }}/
          cp -r css /tmp/${{ env.APP_ID }}/
          cp -r img /tmp/${{ env.APP_ID }}/
          cp -r templates /tmp/${{ env.APP_ID }}/
          cp LICENSE /tmp/${{ env.APP_ID }}/

      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "$APP_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APP_PRIVATE_KEY secret not set — skipping app signing."
          fi
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Sign app
        if: steps.signing.outputs.available == 'true'
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          echo "$APP_PRIVATE_KEY" > /tmp/app.key
          curl -sf https://raw.githubusercontent.com/nextcloud/app-certificate-requests/master/weekplanner/weekplanner.crt > /tmp/app.crt
          # sign-app.php produces an RSA-PSS signature with hash=sha1,
          # MGF1-hash=sha512, salt-length=0 — the exact scheme Nextcloud's
          # lib/private/IntegrityCheck/Checker.php verifies against. Drifting
          # from this scheme (e.g. using openssl_sign+SHA512, which is
          # PKCS#1 v1.5) produces a signature.json that internally
          # self-verifies but is rejected at install time with
          # "Signature could not get verified." — that was the bug
          # introduced in v1.8.3 (and inherited by v1.9.0). The script
          # also aborts on cert/key mismatch (the v1.8.1 bug).
          php tools/sign-app.php "/tmp/${APP_ID}" /tmp/app.key /tmp/app.crt
          rm -f /tmp/app.key /tmp/app.crt

      - name: Verify signature locally (mirrors Nextcloud integrity check)
        if: steps.signing.outputs.available == 'true'
        run: |
          # Runs the same checks as `occ integrity:check-app weekplanner`,
          # using PSS verification with the same parameters Nextcloud uses.
          # If this fails the release is aborted before publishing, so users
          # never see "Signature could not get verified" in the admin panel.
          php tools/verify-app-signature.php "/tmp/${APP_ID}" --cn="${APP_ID}"

      - name: Create tarball
        run: |
          cd /tmp
          tar czf ${{ env.APP_ID }}-v${{ steps.version.outputs.version }}.tar.gz ${{ env.APP_ID }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          ASSET="/tmp/${{ env.APP_ID }}-v${{ steps.version.outputs.version }}.tar.gz"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release create "$TAG" "$ASSET" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes
          else
            gh release upload "$TAG" "$ASSET" \
              --repo "${{ github.repository }}" \
              --clobber
          fi

      - name: Check App Store token
        id: appstore
        run: |
          if [ -n "$NEXTCLOUD_APPSTORE_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NEXTCLOUD_APPSTORE_TOKEN secret not set — skipping App Store publish."
          fi
        env:
          NEXTCLOUD_APPSTORE_TOKEN: ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}

      - name: Publish to Nextcloud App Store
        if: steps.signing.outputs.available == 'true' && steps.appstore.outputs.available == 'true'
        env:
          NEXTCLOUD_APPSTORE_TOKEN: ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          TARBALL="/tmp/${{ env.APP_ID }}-v${{ steps.version.outputs.version }}.tar.gz"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/${{ env.APP_ID }}-v${{ steps.version.outputs.version }}.tar.gz"
          echo "$APP_PRIVATE_KEY" > /tmp/app.key
          SIGNATURE=$(openssl dgst -sha512 -sign /tmp/app.key "$TARBALL" | openssl base64 -A)
          rm -f /tmp/app.key
          curl -X POST \
            https://apps.nextcloud.com/api/v1/apps/releases \
            -H "Authorization: Token $NEXTCLOUD_APPSTORE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"$DOWNLOAD_URL\", \"signature\": \"$SIGNATURE\", \"nightly\": false}"
